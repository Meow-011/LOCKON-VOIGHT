# LOCKON VOIGHT — Production Docker Compose
# Full-stack deployment: API + Dashboard + PostgreSQL + TimescaleDB + Redis + Celery

services:
  # ─────────────────────────────────────────────
  # PostgreSQL with TimescaleDB
  # ─────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: voight-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: voight_db
      POSTGRES_USER: voight
      POSTGRES_PASSWORD: ${DB_PASSWORD:-voight_secret_prod}
    ports:
      - "127.0.0.1:5432:5432"  # Only bind to localhost in production
    volumes:
      - voight_pgdata:/var/lib/postgresql/data
      - ../deploy/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voight -d voight_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  # ─────────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: voight-redis
    restart: unless-stopped
    volumes:
      - voight_redis:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-voight_redis_prod}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-voight_redis_prod}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ─────────────────────────────────────────────
  # API Server (FastAPI)
  # ─────────────────────────────────────────────
  api-server:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: voight-api
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://voight:${DB_PASSWORD:-voight_secret_prod}@postgres:5432/voight_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-voight_redis_prod}@redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET:?JWT_SECRET is required - generate with: python -c \"import secrets; print(secrets.token_urlsafe(64))\"}
      GRPC_PORT: "50051"
      GRPC_TLS_ENABLED: "true"
      GRPC_CA_CERT_PATH: /certs/ca-cert.pem
      GRPC_SERVER_CERT_PATH: /certs/server-cert.pem
      GRPC_SERVER_KEY_PATH: /certs/server-key.pem
      CORS_ORIGINS: '["http://localhost","https://${DOMAIN:-localhost}"]'
    ports:
      - "8000:8000"
      - "50051:50051"
    volumes:
      - ../deploy/certs/generated:/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  # ─────────────────────────────────────────────
  # Celery Worker
  # ─────────────────────────────────────────────
  celery-worker:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: voight-celery-worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+asyncpg://voight:${DB_PASSWORD:-voight_secret_prod}@postgres:5432/voight_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-voight_redis_prod}@redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET:?JWT_SECRET is required - generate with: python -c \"import secrets; print(secrets.token_urlsafe(64))\"}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  # ─────────────────────────────────────────────
  # Celery Beat (Scheduler)
  # ─────────────────────────────────────────────
  celery-beat:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: voight-celery-beat
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+asyncpg://voight:${DB_PASSWORD:-voight_secret_prod}@postgres:5432/voight_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-voight_redis_prod}@redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # Dashboard (Nginx + React)
  # ─────────────────────────────────────────────
  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    container_name: voight-dashboard
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  voight_pgdata:
    driver: local
  voight_redis:
    driver: local
